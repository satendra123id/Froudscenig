<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSafe Pro - Offline Scam Scanner by sitaram Lodhi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Poppins:wght@300;500;700&display=swap');

        :root {
            --bg-dark: #0a0f16; --panel-bg: #131b26; --text-main: #e2e8f0;
            --neon-green: #00ff88; --neon-red: #ff3366; --neon-yellow: #ffcc00; --gold: #ffd700;
            --border-glow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; background: var(--panel-bg); padding: 30px; border-radius: 12px; border: 1px solid #1f2d3d; box-shadow: var(--border-glow); margin-bottom: 20px; position: relative; }

        /* Top Header */
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #2a3b4c; padding-bottom: 15px;}
        h1 { margin: 0; color: var(--neon-green); font-family: 'Fira Code', monospace; font-size: 24px;}
        h1 span { color: #fff; }
        .status-badge { background: #2a3b4c; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; font-family: 'Fira Code', monospace;}
        .premium-active { color: var(--gold); border: 1px solid var(--gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); background: rgba(255, 215, 0, 0.1);}

        textarea { width: 100%; padding: 15px; background: #0d131a; border: 1px solid #2a3b4c; color: var(--neon-green); font-family: 'Fira Code', monospace; border-radius: 8px; box-sizing: border-box; margin-top: 8px; outline: none; height: 120px; resize: vertical; }
        textarea:focus { border-color: var(--neon-green); }
        label { font-size: 14px; color: #8b9cad; font-weight: 500; }

        button { background: var(--neon-green); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.3s; text-transform: uppercase; }
        button:hover { box-shadow: 0 0 15px var(--neon-green); transform: translateY(-2px); }

        /* Results Area */
        #resultArea { display: none; margin-top: 30px; padding: 20px; border-radius: 8px; background: #0d131a; border: 1px solid #2a3b4c; }
        .score-card { display: flex; align-items: center; justify-content: space-between; padding-bottom: 15px; border-bottom: 1px solid #1f2d3d; margin-bottom: 15px; }
        .risk-badge { padding: 10px 20px; border-radius: 5px; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        .safe { background: rgba(0, 255, 136, 0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .danger { background: rgba(255, 51, 102, 0.1); color: var(--neon-red); border: 1px solid var(--neon-red); }
        .warning { background: rgba(255, 204, 0, 0.1); color: var(--neon-yellow); border: 1px solid var(--neon-yellow); }
        .analysis-text { line-height: 1.6; color: #a0aec0; }
        .red-flags { margin-top: 15px; color: var(--neon-red); font-family: 'Fira Code', monospace; font-size: 13px;}
    </style>
</head>
<body>

    <div class="container" id="mainApp">
        <div class="header-flex">
            <h1>Cyber<span>Safe</span> 🛡️</h1>
            <div id="accountStatus" class="status-badge">Smart Scanner Active</div>
        </div>

        <div>
            <label>Suspicious Link ya Message Paste Karein:</label>
            <textarea id="scanInput" placeholder="E.g., 'Aapki 25 lakh ki lottery lagi hai! Click here: http://bit.ly/xyz' ..."></textarea>
        </div>

        <button id="scanBtn" onclick="initiateScan()">🔍 Scan Now</button>

        <div id="resultArea">
            <div class="score-card">
                <div>
                    <h3 style="margin: 0; color: #fff;">Threat Analysis Report</h3>
                    <small id="scanTime" style="color: #64748b;"></small>
                </div>
                <div id="riskBadge" class="risk-badge safe">SAFE</div>
            </div>
            <h4 style="color: #fff; margin-bottom: 5px;">Security Analysis:</h4>
            <div id="analysisText" class="analysis-text"></div>
            <div id="flagsContainer" style="display: none;">
                <h4 style="color: var(--neon-red); margin-bottom: 5px; margin-top: 20px;">⚠️ Red Flags Detected:</h4>
                <ul id="redFlagsList" class="red-flags"></ul>
            </div>
        </div>
    </div>

    <script>
        // Bina API Key ke chalne wala "Smart Logic"
        function analyzeTextLocal(text) {
            let textLower = text.toLowerCase();
            let redFlags = [];
            let riskLevel = "SAFE";
            let analysis = "Yeh message filhal safe lag raha hai. Phir bhi anjaan logo par bharosa na karein.";

            // Scam Keywords Dictionary
            const urgencyWords = ["urgent", "block", "suspend", "action required", "immediately", "band ho jayega"];
            const moneyWords = ["lottery", "prize", "cash", "free money", "winner", "jeeto", "lakho"];
            const dataWords = ["otp", "password", "pin", "kyc", "bank details", "aadhar"];
            const sketchyLinks = ["bit.ly", "tinyurl", "ngrok", "free", "xyz", "http://"]; // http:// without s is unsecure

            // Check Urgency
            if (urgencyWords.some(word => textLower.includes(word))) {
                redFlags.push("Account block ya urgent action ka darr dikhaya ja raha hai.");
            }
            // Check Money/Lottery Scams
            if (moneyWords.some(word => textLower.includes(word))) {
                redFlags.push("Fake lottery ya free paiso ka lalach diya gaya hai.");
            }
            // Check Personal Data Requests
            if (dataWords.some(word => textLower.includes(word))) {
                redFlags.push("Aapse OTP, Password ya KYC details mangi ja rahi hain (kabhi share na karein).");
            }
            // Check Sketchy Links
            if (sketchyLinks.some(word => textLower.includes(word)) || (textLower.includes("http") && !textLower.includes("https"))) {
                redFlags.push("Anjaan ya unsecure link (URL) paya gaya hai. Click na karein!");
            }

            // Risk Assessment Logic
            if (redFlags.length >= 2) {
                riskLevel = "DANGER";
                analysis = "⚠️ ALERT! Yeh message 100% scam lag raha hai. Isme diye gaye kisi bhi link par click na karein aur sender ko block kar dein.";
            } else if (redFlags.length === 1) {
                riskLevel = "WARNING";
                analysis = "Suspicious activity detect hui hai. Kripya is message par dhyan se react karein aur apni details share na karein.";
            }

            return { risk_level: riskLevel, analysis: analysis, red_flags: redFlags };
        }

        function initiateScan() {
            const inputData = document.getElementById('scanInput').value.trim();
            if(!inputData) return alert("Pehle koi message ya link paste karein!");

            const btn = document.getElementById('scanBtn');
            btn.innerText = "⏳ Scanning Server... Please Wait";
            btn.style.opacity = "0.7";
            document.getElementById('resultArea').style.display = 'none';

            // Fake delay to look professional and like a real server is processing
            setTimeout(() => {
                // Local logic call kiya (Bina API)
                const result = analyzeTextLocal(inputData);
                displayResults(result);

                btn.innerText = "🔍 Scan Now";
                btn.style.opacity = "1";
            }, 1500); // 1.5 seconds delay
        }

        function displayResults(data) {
            const area = document.getElementById('resultArea');
            const badge = document.getElementById('riskBadge');
            const flagsContainer = document.getElementById('flagsContainer');
            const flagsList = document.getElementById('redFlagsList');
            
            area.style.display = 'block';
            document.getElementById('scanTime').innerText = "Scanned at: " + new Date().toLocaleTimeString();
            document.getElementById('analysisText').innerText = data.analysis;

            badge.innerText = data.risk_level;
            badge.className = 'risk-badge'; 
            if(data.risk_level === 'DANGER') badge.classList.add('danger');
            else if(data.risk_level === 'WARNING') badge.classList.add('warning');
            else badge.classList.add('safe');

            if(data.red_flags && data.red_flags.length > 0) {
                flagsContainer.style.display = 'block';
                flagsList.innerHTML = '';
                data.red_flags.forEach(flag => {
                    const li = document.createElement('li');
                    li.innerText = "[!] " + flag;
                    flagsList.appendChild(li);
                });
            } else {
                flagsContainer.style.display = 'none';
            }
        }
    </script>
</body>
</html>
